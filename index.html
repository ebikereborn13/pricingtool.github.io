<div id="ebr-calculator">
  <meta name="robots" content="noindex, nofollow">
  
  <style>
    /* Tes styles d'origine conservés */
    #ebr-calculator { font-family: Arial, sans-serif; max-width: 500px; margin: auto; position: relative; z-index: 1; }
    #ebr-calculator label { font-weight: bold; display: block; margin-top: 10px; }
    #ebr-calculator input, #ebr-calculator select { width: 100%; padding: 10px; margin-top: 4px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
    #ebr-calculator button { margin-top: 20px; width: 100%; padding: 12px; background: #FF6600; font-size: 16px; font-weight: bold; color: #ffffff; border: none; border-radius: 4px; cursor: pointer; }
    #ebr-calculator button:hover { background: #e65c00; }
    #ebr-calculator button:disabled { background: #ccc; }
    .ebr-results-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
    .ebr-price-box { padding: 15px; border: 2px solid #eee; border-radius: 8px; text-align: center; background: #f9f9f9; }
    .ebr-price-box span { display: block; font-size: 0.9em; color: #666; margin-bottom: 5px; text-transform: uppercase; font-weight: bold; }
    .ebr-price-box div { font-size: 1.4em; font-weight: bold; color: #000; }
    .ebr-price-box.highlight { border-color: #FF6600; background: #fff5ee; }
    #ebr-error { margin-top: 15px; color: #d32f2f; display: none; text-align: center; font-weight: bold; }

    #ebr-email-section { display: none; margin-top: 25px; padding: 15px; border: 2px dashed #FF6600; border-radius: 8px; background: #fff; }

    /* Styles pour l'écran de verrouillage */
    #ebr-lock-screen { text-align: center; padding: 40px 20px; background: #1a1a1a; color: white; border-radius: 8px; }
    #ebr-lock-screen input { margin-bottom: 10px; text-align: center; }
    #ebr-main-content { display: none; }

    /* Style pour le bouton de recherche secondaire */
    #ebr-search-btn { background: #555; margin-top: 10px; font-size: 14px; padding: 8px; }
    #ebr-search-btn:hover { background: #333; }

    /* Style pour les cases à cocher */
    .ebr-tva-container { background: #f0f0f0; padding: 10px; border-radius: 4px; margin-top: 15px; }
    .ebr-tva-option { display: flex !important; align-items: center; cursor: pointer; font-weight: normal !important; margin-top: 5px !important; }
    .ebr-tva-option input { width: auto !important; margin: 0 10px 0 0 !important; cursor: pointer; }
  </style>

  <div id="ebr-lock-screen">
    <div style="font-size: 40px; margin-bottom: 10px;">🚲</div>
    <h2 style="margin-bottom: 20px;">Accès Privé EBR</h2>
    <input type="password" id="ebr-auth-pass" placeholder="Entrez votre code">
    <button type="button" id="ebr-auth-btn">Déverrouiller</button>
    <p id="auth-error" style="color: #ff4444; display: none; font-size: 14px; margin-top: 10px;">Code incorrect</p>
  </div>

  <div id="ebr-main-content">
    <form id="ebr-form">
      <input type="hidden" id="ebr-uniqueId" name="IDUnique" />

      <label>Type de Vélo *</label>
      <select name="TypeVelo" id="ebr-type" required>
        <option value="">Sélectionner</option>
        <option value="VTTAE">VTTAE</option>
        <option value="SUV/VTC/Ville">SUV/VTC/Ville</option>
        <option value="VTTAE Light">VTTAE Light</option>
      </select>

      <label>Marque du vélo *</label>
      <select name="Marque" id="ebr-marque" required>
        <option value="">Sélectionner</option>
        <option>BH</option><option>Bergamont</option><option>Bianchi</option>
        <option>Bulls</option><option>Cannondale</option><option>Canyon</option>
        <option>Cube</option><option>Decathlon</option><option>Focus</option>
        <option>Ghost</option><option>Giant</option><option>GT</option>
        <option>Haibike</option><option>Husqvarna</option><option>KTM</option>
        <option>Lapierre</option><option>Liv</option><option>Marin</option>
        <option>Merida</option><option>Mondraker</option><option>Moustache</option>
        <option>Orbea</option><option>Raymon</option><option>Rossignol</option>
        <option>Santa Cruz</option><option>Scott</option><option>Stevens</option>
        <option>Sunn</option><option>Trek</option><option>Conway</option><option>Corratec</option>
      </select>

      <label>Modèle *</label>
      <input type="text" name="Modele" id="ebr-modele" required />

      <label>Année *</label>
      <select name="Annee" id="ebr-yearSelect" required>
        <option value="">Sélectionner</option>
      </select>

      <button type="button" id="ebr-search-btn">🔍 Vérifier le prix neuf sur Google</button>

      <label>Prix d'origine (€) *</label>
      <input type="number" name="PrixOrigine" id="ebr-prix" required />

      <label>Kilométrage *</label>
      <input type="number" name="Kilometrage" id="ebr-km" required />

      <label>Motorisation *</label>
      <select name="Motorisation" id="ebr-moteur" required>
        <option value="">Sélectionner</option>
        <option>Bosch</option>
        <option>Yamaha</option>
        <option>Shimano</option>
      </select>

      <label>Capacité batterie (Wh) *</label>
      <input type="number" name="CapaciteBatterie" id="ebr-batterie" required />

      <div class="ebr-tva-container">
        <label>Régime de TVA (obligatoire) *</label>
        <label class="ebr-tva-option">
          <input type="checkbox" id="ebr-tva-marge" class="tva-check"> Achat en TVA sur Marge
        </label>
        <label class="ebr-tva-option">
          <input type="checkbox" id="ebr-tva-classique" class="tva-check"> Achat en TVA Classique
        </label>
      </div>
      
      <button type="submit" id="ebr-submit-btn">Estimer mes tarifs</button>
    </form>

    <div class="ebr-results-container">
      <div class="ebr-price-box highlight">
        <span>Tarif de Reprise</span>
        <div id="res-reprise">-- €</div>
      </div>
      <div class="ebr-price-box">
        <span>Tarif de Revente</span>
        <div id="res-revente">-- €</div>
      </div>
    </div>

    <div id="ebr-email-section">
      <label>Adresse E-mail du destinataire</label>
      <input type="email" id="ebr-user-email" placeholder="exemple@mail.com">
      <button type="button" id="ebr-mailto-btn">Envoyer le tarif par E-mail</button>
    </div>

    <div id="ebr-error">❌ Erreur de calcul. Veuillez réessayer.</div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

  <script>
    (function () {
      const HASH_KEY = "28406f3871e106b1bb54c647618c087e839b8564d0856ed822f6461fd29de4f2";
      const PYTHON_API_URL = "https://ebikereborn-ebikereborn-pricing.hf.space/estimate";

      const lockScreen = document.getElementById("ebr-lock-screen");
      const mainContent = document.getElementById("ebr-main-content");
      const passInput = document.getElementById("ebr-auth-pass");
      const authBtn = document.getElementById("ebr-auth-btn");
      const authError = document.getElementById("auth-error");

      // Logique des cases à cocher mutuellement exclusives
      const tvaMarge = document.getElementById("ebr-tva-marge");
      const tvaClassique = document.getElementById("ebr-tva-classique");

      tvaMarge.addEventListener("change", () => { if(tvaMarge.checked) tvaClassique.checked = false; });
      tvaClassique.addEventListener("change", () => { if(tvaClassique.checked) tvaMarge.checked = false; });

      authBtn.addEventListener("click", function() {
          const hashedInput = CryptoJS.SHA256(passInput.value).toString().toLowerCase();
          if(hashedInput === HASH_KEY.toLowerCase()) {
              lockScreen.style.display = "none";
              mainContent.style.display = "block";
          } else {
              authError.style.display = "block";
          }
      });

      const form = document.getElementById("ebr-form");
      const yearSelect = document.getElementById("ebr-yearSelect");
      const btn = document.getElementById("ebr-submit-btn");
      const searchBtn = document.getElementById("ebr-search-btn");
      const resReprise = document.getElementById("res-reprise");
      const resRevente = document.getElementById("res-revente");
      const errorBox = document.getElementById("ebr-error");
      const emailSection = document.getElementById("ebr-email-section");
      const mailtoBtn = document.getElementById("ebr-mailto-btn");

      let globalResult = { reprise: "", revente: "" };

      const currentYear = new Date().getFullYear();
      for (let y = currentYear; y >= 2016; y--) {
        const opt = document.createElement("option");
        opt.value = y; opt.textContent = y;
        yearSelect.appendChild(opt);
      }

      searchBtn.addEventListener("click", function() {
        const marque = document.getElementById("ebr-marque").value;
        const modele = document.getElementById("ebr-modele").value;
        const annee = document.getElementById("ebr-yearSelect").value;
        if (!marque || !modele) { alert("Veuillez saisir au moins la marque et le modèle."); return; }
        const query = encodeURIComponent(`prix neuf vélo électrique ${marque} ${modele} ${annee}`);
        window.open(`https://www.google.com/search?q=${query}`, '_blank');
      });

      form.addEventListener("submit", async function (e) {
        e.preventDefault();

        // Validation TVA
        if (!tvaMarge.checked && !tvaClassique.checked) {
          alert("Veuillez sélectionner un régime de TVA (Marge ou Classique).");
          return;
        }

        errorBox.style.display = "none";
        emailSection.style.display = "none";
        btn.disabled = true;
        btn.textContent = "Calcul dynamique...";
        resReprise.textContent = "⏳";
        resRevente.textContent = "⏳";

        const payload = {
          access_token: HASH_KEY,
          TypeVelo: document.getElementById("ebr-type").value,
          Marque: document.getElementById("ebr-marque").value,
          Modele: document.getElementById("ebr-modele").value,
          PrixOrigine: document.getElementById("ebr-prix").value,
          Annee: document.getElementById("ebr-yearSelect").value,
          Kilometrage: document.getElementById("ebr-km").value,
          Motorisation: document.getElementById("ebr-moteur").value,
          CapaciteBatterie: document.getElementById("ebr-batterie").value
        };

        try {
          const response = await fetch(PYTHON_API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });

          if (!response.ok) throw new Error("Réponse serveur incorrecte");
          const result = await response.json();

          if (result && !result.error) {
            let rawReprise = result.reprise;
            let labelReprise = "TTC";
            
            // Calcul TVA Classique (HT)
            if (tvaClassique.checked) {
              rawReprise = Math.round(rawReprise * 0.833);
              labelReprise = "HT";
            }

            globalResult.reprise = rawReprise.toLocaleString() + " € " + labelReprise;
            globalResult.revente = result.revente.toLocaleString() + " € TTC";
            
            resReprise.textContent = globalResult.reprise;
            resRevente.textContent = globalResult.revente;
            emailSection.style.display = "block";
          } else {
            throw new Error(result.error || "Erreur inconnue");
          }
        } catch (err) {
          errorBox.style.display = "block";
          resReprise.textContent = "-- €";
          resRevente.textContent = "-- €";
        } finally {
          btn.disabled = false;
          btn.textContent = "Estimer mes tarifs";
        }
      });

mailtoBtn.addEventListener("click", function() {
        const destinataire = document.getElementById("ebr-user-email").value;
        if(!destinataire || !destinataire.includes('@')) { alert("Merci de saisir une adresse email valide."); return; }

        const marque = document.getElementById("ebr-marque").value;
        const modele = document.getElementById("ebr-modele").value;
        const typeVelo = document.getElementById("ebr-type").value;
        const annee = document.getElementById("ebr-yearSelect").value;
        const km = document.getElementById("ebr-km").value;
        const moteur = document.getElementById("ebr-moteur").value;

        const sujet = encodeURIComponent("Estimation Reprise : " + marque + " " + modele);
        
        let corpsTexte = `Bonjour,\n\nVoici l'estimation pour votre vélo :\n\n`;
        corpsTexte += `Type : ${typeVelo}\n`;
        corpsTexte += `Modèle : ${marque} ${modele}\n`;
        corpsTexte += `Année : ${annee}\n`;
        corpsTexte += `Motorisation : ${moteur}\n`;
        corpsTexte += `Kilométrage : ${km} km\n\n`;
        corpsTexte += `💰 TARIF DE RACHAT : ${globalResult.reprise}\n\n`;
        corpsTexte += `Valable 14 jours sous réserve de vérification.`;

        window.location.href = `mailto:${destinataire}?subject=${sujet}&body=${encodeURIComponent(corpsTexte)}`;
      });
    })();
  </script>
</div>
